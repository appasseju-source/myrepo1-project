<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cars Java Docker Jenkins App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: linear-gradient(135deg, #43cea2 0%, #185a9d 100%);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 80px auto;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 40px 30px;
            text-align: center;
        }
        h1 {
            font-size: 2.2em;
            margin-bottom: 0.5em;
            font-weight: 700;
        }
        .car-animation {
            width: 100%;
            height: 120px;
            position: relative;
            overflow: visible;
            margin-bottom: 30px;
        }
        .car {
            position: absolute;
            left: -120px;
            top: 40px;
            width: 120px;
            animation: drive 3s linear infinite;
        }
        .car2 {
            position: absolute;
            left: -180px;
            top: 80px;
            width: 90px;
            animation: drive2 4s linear infinite;
            opacity: 0.8;
        }
        @keyframes drive {
            0% {
                left: -120px;
            }
            100% {
                left: 700px;
            }
        }
        @keyframes drive2 {
            0% {
                left: -180px;
            }
            100% {
                left: 700px;
            }
        }
        .footer {
            margin-top: 2em;
            font-size: 0.95em;
            color: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="car-animation">
            <!-- First Car SVG -->
            <svg class="car" viewBox="0 0 120 60">
                <rect x="10" y="30" width="100" height="20" rx="8" fill="#ff5252"/>
                <rect x="30" y="20" width="60" height="20" rx="6" fill="#fff176"/>
                <circle cx="30" cy="55" r="8" fill="#222"/>
                <circle cx="90" cy="55" r="8" fill="#222"/>
                <circle cx="30" cy="55" r="4" fill="#bdbdbd"/>
                <circle cx="90" cy="55" r="4" fill="#bdbdbd"/>
            </svg>
            <!-- Second Car SVG -->
            <svg class="car2" viewBox="0 0 90 45">
                <rect x="5" y="20" width="80" height="15" rx="6" fill="#40c4ff"/>
                <rect x="20" y="10" width="50" height="15" rx="5" fill="#a5d6a7"/>
                <circle cx="25" cy="40" r="6" fill="#222"/>
                <circle cx="70" cy="40" r="6" fill="#222"/>
                <circle cx="25" cy="40" r="3" fill="#bdbdbd"/>
                <circle cx="70" cy="40" r="3" fill="#bdbdbd"/>
            </svg>
        </div>
        <h1>Welcome to the Cars Java Docker Jenkins Application!</h1>
        <p>
            Watch the cars drive across the road!<br>
            This is a sample application deployed in a Docker container.<br>
            <strong>CI/CD powered by Jenkins.</strong>
        </p>
        <div class="footer">
            &copy; 2026 Cars Java Docker Jenkins Demo
        </div>
    </div>
</body>
</html>
